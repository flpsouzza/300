<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Plantão Noturno - Final de Semana</title>
    <link rel="manifest" href="data:application/json,{}">
    <style>
        /* ... (mesmo CSS anterior, com pequena adição para o botão pulsar) ... */
        :root {
            --rio-blue: #002D5E;
            --rio-light: #004A8D;
            --accent-bronze: #8C6239;
            --bg-body: #F4F7FA;
            --bg-card: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }
        .calendar-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            position: relative;
        }
        .top-bar-header {
            background-color: var(--rio-blue);
            color: #FFF;
            text-align: center;
            padding: 14px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: #FFF;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .title-block {
            position: relative;
            width: 100%;
        }
        .title-block .month-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--rio-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .title-block .year-title {
            font-size: 15px;
            color: var(--accent-bronze);
            font-weight: 700;
            letter-spacing: 6px;
            margin-top: 4px;
            text-transform: uppercase;
        }
        /* Botão de fixar (home) integrado ao título */
        .btn-fix-home {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            color: var(--rio-blue);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
        }
        .btn-fix-home:hover {
            background: rgba(0,45,94,0.08);
            transform: scale(1.05);
        }
        .btn-fix-home .icon {
            font-size: 18px;
        }
        /* Animação de pulso para chamar atenção */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .btn-fix-home.pulse .icon {
            animation: pulse 1.5s ease-in-out infinite;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
            justify-content: center;
            align-items: center;
            background: #F8FAFC;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-controls, .view-controls, .search-control, .jump-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar select, .toolbar input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            color: var(--text-main);
            background: #FFF;
        }
        .btn-action {
            background-color: #FFF;
            color: var(--rio-blue);
            border: 1.5px solid var(--rio-blue);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .btn-action:hover, .btn-action.active {
            background-color: var(--rio-blue);
            color: #FFF;
        }
        .calendar-content { padding: 12px; }
        .calendar-grid-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .calendar-grid-table th {
            background-color: var(--rio-blue);
            color: #FFF;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 10px 4px;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .calendar-grid-table td {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
            padding: 6px 4px;
            height: 95px;
            background-color: #FFF;
        }
        .calendar-grid-table tr td:last-child { border-right: none; }
        .calendar-grid-table tr:last-child td { border-bottom: none; }
        .calendar-grid-table .empty-cell { background-color: #F8FAFC; }
        .date-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
            padding-right: 2px;
        }
        .date-num {
            font-weight: 700;
            font-size: 12px;
            color: #94A3B8;
        }
        .duty-day-circle {
            width: 22px;
            height: 22px;
            border: 2px solid var(--rio-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--rio-light);
            font-size: 11px;
            font-weight: 800;
        }
        .mobile-list-view {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 8px;
        }
        .mobile-card {
            background: #FFF;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mobile-card-date {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .mobile-day-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            width: 40px;
        }
        .badges-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 100%;
        }
        .mobile-list-view .badges-list {
            width: auto;
            min-width: 130px;
            align-items: flex-end;
        }
        .badge {
            font-size: 10px;
            font-weight: 800;
            color: #FFF;
            padding: 3px 4px;
            border-radius: 4px;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .b-julio { background-color: #DC2626; }
        .b-carlos { background-color: #D97706; }
        .b-leticia { background-color: #0891B2; }
        .b-gustavo { background-color: #EA580C; }
        .b-tatiane { background-color: #2563EB; }
        .b-leandro { background-color: #7C3AED; }
        .b-felipe { background-color: #16A34A; }
        .today-cell { background-color: #FFFBEB !important; border: 2px solid #F59E0B !important; }
        .today-card { border: 2px solid #F59E0B !important; background-color: #FFFBEB !important; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }
        .modal-card {
            background: #FFF;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
            animation: scaleUp 0.2s ease-out;
        }
        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-card h3 { color: var(--rio-blue); margin-bottom: 12px; font-size: 18px; text-transform: uppercase; }
        .modal-result-box { margin: 16px 0; display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .modal-card .badge { font-size: 13px; padding: 6px 16px; width: auto; min-width: 150px; }
        .install-step {
            text-align: left;
            margin: 10px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        .install-step strong { color: var(--rio-blue); }
        .install-step .icon {
            font-size: 24px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }
        .step-number {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: var(--rio-blue);
            color: #FFF;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-weight: 700;
            margin-right: 8px;
        }
        footer {
            padding: 16px 20px;
            background-color: #F8FAFC;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .legend-container { display: flex; gap: 14px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .l-dot { width: 10px; height: 10px; border-radius: 50%; }
        .l-active { border: 2px solid var(--rio-light); background: transparent; }
        .l-today { background-color: #FFFBEB; border: 2px solid #F59E0B; }
        .credit-footer { font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .credit-footer strong { color: var(--rio-blue); }
        .footer-fix-link {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .footer-fix-link:hover {
            background: var(--rio-blue);
            color: #FFF;
            border-color: var(--rio-blue);
        }
        @media (max-width: 650px) {
            body { padding: 4px; }
            .calendar-container { border-radius: 12px; }
            .toolbar { padding: 12px 10px; gap: 12px; flex-direction: column; }
            .nav-controls, .view-controls, .search-control, .jump-control { width: 100%; justify-content: center; }
            .calendar-grid-table td { height: 75px; padding: 4px 2px; }
            .badge { font-size: 8.5px; padding: 2px 1px; border-radius: 3px; }
            .duty-day-circle { width: 18px; height: 18px; font-size: 9px; }
            footer { flex-direction: column; gap: 10px; text-align: center; }
            .btn-action { font-size: 11px; padding: 6px 12px; }
            .btn-fix-home { font-size: 12px; }
            .btn-fix-home .icon { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="top-bar-header">Final de Semana</div>
        <header>
            <div class="title-block">
                <div class="month-title" id="month-label">Julho</div>
                <div class="year-title" id="year-label">2026</div>
                <!-- Botão de fixar (home) integrado ao título -->
                <button class="btn-fix-home pulse" id="btn-add-to-home" aria-label="Adicionar à tela inicial">
                    <span class="icon">🏠</span> <span class="label">Fixar</span>
                </button>
            </div>
        </header>
        <div class="toolbar">
            <div class="nav-controls">
                <button class="btn-action" id="btn-prev-month">« Ant</button>
                <button class="btn-action" id="btn-next-month">Próx »</button>
            </div>
            <div class="view-controls">
                <button class="btn-action active" id="view-grid-btn">Calendário</button>
                <button class="btn-action" id="view-list-btn">Lista</button>
            </div>
            <div class="jump-control">
                <select id="jump-month-select">
                    <option value="0">Janeiro</option><option value="1">Fevereiro</option><option value="2">Março</option>
                    <option value="3">Abril</option><option value="4">Maio</option><option value="5">Junho</option>
                    <option value="6" selected>Julho</option><option value="7">Agosto</option><option value="8">Setembro</option>
                    <option value="9">Outubro</option><option value="10">Novembro</option><option value="11">Dezembro</option>
                </select>
                <select id="jump-year-select"></select>
                <button class="btn-action" id="jump-submit-btn">Ir</button>
            </div>
            <div class="search-control">
                <input type="date" id="search-date-input">
                <button class="btn-action" id="search-submit-btn">Buscar</button>
            </div>
        </div>
        <div class="calendar-content">
            <table class="calendar-grid-table" id="main-grid-view">
                <thead><tr><th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th></tr></thead>
                <tbody id="calendar-table-body"></tbody>
            </table>
            <div class="mobile-list-view" id="main-list-view"></div>
        </div>
        <footer>
            <div class="legend-container">
                <div class="legend-item"><div class="l-dot l-active"></div> Plantão</div>
                <div class="legend-item"><div class="l-dot l-today"></div> Hoje</div>
            </div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <a href="#" class="footer-fix-link" id="footer-fix-link">🏠 Fixar na Home</a>
                <span class="credit-footer">Desenvolvido por <strong>Felipe Souza</strong></span>
            </div>
        </footer>
    </div>

    <!-- MODAL DE PESQUISA -->
    <div class="modal-overlay" id="search-modal">
        <div class="modal-card">
            <h3 id="modal-date-title">Data</h3>
            <div class="modal-result-box" id="modal-results"></div>
            <button class="btn-action" id="modal-close-btn">Fechar</button>
        </div>
    </div>

    <!-- MODAL DE INSTALAÇÃO (ADICIONAR À HOME) -->
    <div class="modal-overlay" id="install-modal">
        <div class="modal-card">
            <h3>🏠 Fixar na Tela Inicial</h3>
            <div id="install-instructions" style="text-align: left; margin-top: 12px;"></div>
            <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
                <button class="btn-action" id="install-modal-close">Entendi</button>
                <button class="btn-action" id="copy-link-btn" style="background: var(--rio-blue); color: #FFF;">Copiar link</button>
            </div>
        </div>
    </div>

    <script>
        // ========== LÓGICA DO CALENDÁRIO ==========
        const monthNamesList = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        const dayNamesList = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
        const staffRotationList = ["Júlio","Carlos","Leticia","Gustavo","Tatiane"];
        let activeMonth = 6, activeYear = 2026, currentViewMode = "grid";

        const yearSelect = document.getElementById("jump-year-select");
        for (let y=2026; y<=2035; y++) {
            let opt = document.createElement("option");
            opt.value = y; opt.innerText = y;
            yearSelect.appendChild(opt);
        }

        function calculateDaysFromAnchor(y,m,d) {
            const anchor = Date.UTC(2026,6,3);
            const target = Date.UTC(y,m,d);
            return Math.floor((target - anchor) / (1000*60*60*24));
        }
        function mathematicalMod(n,m) { return ((n%m)+m)%m; }
        function cleanStringForClass(text) { return text.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }

        function getWorkersForDate(year, month, day) {
            let activeWorkers = [], isDuty = false;
            const diff = calculateDaysFromAnchor(year, month, day);
            const pos = mathematicalMod(diff, 14);
            if (pos === 0 || pos === 1 || pos === 2) {
                isDuty = true;
                let weekendIdx = Math.floor((diff - (pos===0?0:pos===1?1:2)) / 14);
                const offset = mathematicalMod(weekendIdx*2, 5);
                const order = staffRotationList.slice(offset).concat(staffRotationList.slice(0,offset));
                if (pos===0) activeWorkers.push(order[0], order[1]);
                else if (pos===1) activeWorkers.push("Felipe", order[2]);
                else if (pos===2) activeWorkers.push(order[3], order[4]);
            } else if (pos === 6) {
                isDuty = true;
                activeWorkers.push("Leandro");
            }
            return { isDuty, activeWorkers };
        }

        function buildCalendar() {
            const firstDay = new Date(activeYear, activeMonth, 1).getDay();
            const daysInMonth = new Date(activeYear, activeMonth+1, 0).getDate();
            const today = new Date();
            document.getElementById("month-label").innerText = monthNamesList[activeMonth];
            document.getElementById("year-label").innerText = activeYear;
            document.getElementById("jump-month-select").value = activeMonth;
            document.getElementById("jump-year-select").value = activeYear;

            const tbody = document.getElementById("calendar-table-body");
            const listView = document.getElementById("main-list-view");
            tbody.innerHTML = ""; listView.innerHTML = "";
            let dayNum = 1;

            for (let w=0; w<6; w++) {
                let tr = document.createElement("tr");
                let hasData = false;
                for (let d=0; d<7; d++) {
                    let td = document.createElement("td");
                    if ((w===0 && d<firstDay) || dayNum > daysInMonth) {
                        td.className = "empty-cell";
                    } else {
                        hasData = true;
                        const isToday = (dayNum === today.getDate() && activeYear === today.getFullYear() && activeMonth === today.getMonth());
                        if (isToday) td.className = "today-cell";
                        const { isDuty, activeWorkers } = getWorkersForDate(activeYear, activeMonth, dayNum);
                        let html = `<div class="date-row">`;
                        html += isDuty ? `<div class="duty-day-circle">${dayNum}</div>` : `<div class="date-num">${dayNum}</div>`;
                        html += `</div><div class="badges-list">`;
                        activeWorkers.forEach(w => html += `<span class="badge b-${cleanStringForClass(w)}">${w}</span>`);
                        html += `</div>`;
                        td.innerHTML = html;

                        if (isDuty) {
                            let card = document.createElement("div");
                            card.className = `mobile-card ${isToday ? 'today-card' : ''}`;
                            let cardHtml = `
                                <div class="mobile-card-date">
                                    <div class="mobile-day-name">${dayNamesList[d]}</div>
                                    <div class="duty-day-circle">${dayNum}</div>
                                </div>
                                <div class="badges-list">
                            `;
                            activeWorkers.forEach(w => cardHtml += `<span class="badge b-${cleanStringForClass(w)}">${w}</span>`);
                            cardHtml += `</div>`;
                            card.innerHTML = cardHtml;
                            listView.appendChild(card);
                        }
                        dayNum++;
                    }
                    tr.appendChild(td);
                }
                if (hasData) tbody.appendChild(tr);
                if (dayNum > daysInMonth) break;
            }
        }

        function updateViewToggle() {
            if (currentViewMode === "grid") {
                document.getElementById("main-grid-view").style.display = "table";
                document.getElementById("main-list-view").style.display = "none";
                document.getElementById("view-grid-btn").classList.add("active");
                document.getElementById("view-list-btn").classList.remove("active");
            } else {
                document.getElementById("main-grid-view").style.display = "none";
                document.getElementById("main-list-view").style.display = "flex";
                document.getElementById("view-grid-btn").classList.remove("active");
                document.getElementById("view-list-btn").classList.add("active");
            }
        }
        document.getElementById("view-grid-btn").onclick = () => { currentViewMode="grid"; updateViewToggle(); };
        document.getElementById("view-list-btn").onclick = () => { currentViewMode="list"; updateViewToggle(); };
        document.getElementById("btn-prev-month").onclick = () => { activeMonth--; if(activeMonth<0){activeMonth=11;activeYear--;} buildCalendar(); };
        document.getElementById("btn-next-month").onclick = () => { activeMonth++; if(activeMonth>11){activeMonth=0;activeYear++;} buildCalendar(); };
        document.getElementById("jump-submit-btn").onclick = () => { activeMonth=parseInt(document.getElementById("jump-month-select").value); activeYear=parseInt(document.getElementById("jump-year-select").value); buildCalendar(); };
        document.getElementById("search-submit-btn").onclick = () => {
            const val = document.getElementById("search-date-input").value;
            if(!val) return alert("Selecione uma data!");
            const parts = val.split("-");
            const y=parseInt(parts[0]), m=parseInt(parts[1])-1, d=parseInt(parts[2]);
            const { isDuty, activeWorkers } = getWorkersForDate(y,m,d);
            document.getElementById("modal-date-title").innerText = `${d}/${m+1}/${y}`;
            const box = document.getElementById("modal-results");
            box.innerHTML = "";
            if(!isDuty) box.innerHTML = "<p style='color:#64748B;font-weight:600;'>Nenhum plantão cadastrado.</p>";
            else activeWorkers.forEach(w => box.innerHTML += `<span class="badge b-${cleanStringForClass(w)}">${w}</span>`);
            document.getElementById("search-modal").style.display = "flex";
        };
        document.getElementById("modal-close-btn").onclick = () => { document.getElementById("search-modal").style.display = "none"; };
        document.querySelectorAll(".modal-overlay").forEach(overlay => {
            overlay.addEventListener("click", function(e) { if(e.target===this) this.style.display="none"; });
        });
        buildCalendar();

        // ========== FUNCIONALIDADE DE FIXAR (HOME) ==========
        (function() {
            const btnFix = document.getElementById("btn-add-to-home");
            const footerLink = document.getElementById("footer-fix-link");
            const installModal = document.getElementById("install-modal");
            const installInstructions = document.getElementById("install-instructions");
            const closeModal = document.getElementById("install-modal-close");
            const copyBtn = document.getElementById("copy-link-btn");

            function getOS() {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
                if (/android/i.test(ua)) return 'android';
                return 'other';
            }

            function getInstructions(os) {
                if (os === 'ios') {
                    return `
                        <div class="install-step">
                            <p><strong>📱 No iPhone ou iPad (Safari):</strong></p>
                            <ol style="padding-left: 20px; margin-top: 8px; list-style: none;">
                                <li style="margin-bottom: 12px;">
                                    <span class="step-number">1</span>
                                    Toque no ícone <strong>Compartilhar</strong> 
                                    <span style="font-size:24px; display:inline-block; vertical-align:middle;">⎔</span>
                                    (no Safari, é o quadrado com seta para cima).
                                </li>
                                <li style="margin-bottom: 12px;">
                                    <span class="step-number">2</span>
                                    Role a tela para baixo e toque em <strong>"Adicionar à Tela de Início"</strong>.
                                </li>
                                <li>
                                    <span class="step-number">3</span>
                                    Confirme o nome e toque em <strong>"Adicionar"</strong>.
                                </li>
                            </ol>
                            <p style="margin-top: 12px; color: var(--text-muted); font-size: 13px;">
                                ⚠️ Se você estiver usando outro navegador (ex: Chrome), 
                                <strong>copie o link</strong> e cole no Safari para seguir os passos.
                            </p>
                        </div>
                    `;
                } else if (os === 'android') {
                    return `
                        <div class="install-step">
                            <p><strong>🤖 No Android (Chrome):</strong></p>
                            <ol style="padding-left: 20px; margin-top: 8px; list-style: none;">
                                <li style="margin-bottom: 12px;">
                                    <span class="step-number">1</span>
                                    Toque no menu (três pontinhos <span style="font-size:20px;">⋮</span>) no canto superior direito.
                                </li>
                                <li style="margin-bottom: 12px;">
                                    <span class="step-number">2</span>
                                    Selecione <strong>"Adicionar à tela inicial"</strong> ou <strong>"Instalar aplicativo"</strong>.
                                </li>
                                <li>
                                    <span class="step-number">3</span>
                                    Confirme o nome e toque em <strong>"Adicionar"</strong>.
                                </li>
                            </ol>
                            <p style="margin-top: 12px; color: var(--text-muted); font-size: 13px;">
                                💡 Se aparecer um prompt de instalação, basta clicar em <strong>"Instalar"</strong>.
                            </p>
                        </div>
                    `;
                } else {
                    return `
                        <div class="install-step">
                            <p><strong>🌐 Em outros navegadores:</strong></p>
                            <p>Use a opção <strong>"Adicionar à tela inicial"</strong> ou <strong>"Instalar"</strong> no menu do seu navegador.</p>
                            <p style="margin-top: 8px; color: var(--text-muted);">Seu navegador deve oferecer essa funcionalidade para criar um atalho rápido.</p>
                        </div>
                    `;
                }
            }

            let deferredPrompt = null;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                btnFix.innerHTML = '<span class="icon">📲</span> <span class="label">Instalar</span>';
                footerLink.innerHTML = '📲 Instalar App';
                btnFix.classList.remove('pulse');
            });

            function showInstallModal() {
                const os = getOS();
                installInstructions.innerHTML = getInstructions(os);
                installModal.style.display = 'flex';
            }

            function handleInstallClick(e) {
                e.preventDefault();
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choice) => {
                        if (choice.outcome === 'accepted') {
                            console.log('Usuário instalou o app');
                        } else {
                            console.log('Usuário recusou');
                        }
                        deferredPrompt = null;
                        btnFix.innerHTML = '<span class="icon">🏠</span> <span class="label">Fixar</span>';
                        footerLink.innerHTML = '🏠 Fixar na Home';
                        btnFix.classList.add('pulse');
                    });
                } else {
                    showInstallModal();
                }
            }

            btnFix.addEventListener('click', handleInstallClick);
            footerLink.addEventListener('click', handleInstallClick);
            closeModal.addEventListener('click', () => { installModal.style.display = 'none'; });

            copyBtn.addEventListener('click', () => {
                const url = window.location.href;
                navigator.clipboard.writeText(url).then(() => {
                    alert('Link copiado! Cole no Safari para seguir os passos.');
                }).catch(() => {
                    // fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = url;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('Link copiado!');
                });
            });
        })();
    </script>
</body>
</html>
