<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão Noturno</title>
    <style>
        /* DESIGN PREMIUM, MINIMALISTA E RESPONSIVO */
        :root {
            --primary-blue: #0F172A;   /* Azul escuro ardósia super moderno */
            --accent-bronze: #B45309;  /* Bronze terroso sofisticado */
            --bg-body: #F8FAFC;        /* Fundo claro e descansado */
            --bg-card: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* Container Principal com cantos bem arredondados e sombra suave */
        .calendar-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CABEÇALHO SUPER CLEAN */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px 24px 24px;
            background: #FFFFFF;
            gap: 16px;
        }

        .title-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .month-title {
            font-size: 46px;
            font-weight: 800;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1;
        }

        .year-title {
            font-size: 16px;
            color: var(--accent-bronze);
            font-weight: 700;
            letter-spacing: 8px;
            margin-top: 6px;
            text-transform: uppercase;
        }

        /* Controles de Navegação Minimalistas */
        .nav-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-nav {
            background-color: #FFFFFF;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 20px; /* Botões pílula modernos */
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-nav:hover {
            background-color: var(--primary-blue);
            color: #FFFFFF;
            border-color: var(--primary-blue);
        }

        /* CONTEÚDO DO CALENDÁRIO */
        .calendar-content {
            padding: 0 24px 24px 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background-color: #F8FAFC;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 1px;
        }

        td {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
            padding: 10px;
            height: 105px;
            position: relative;
            background-color: #FFFFFF;
        }

        table tr td:last-child {
            border-right: none;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        .empty-cell { 
            background-color: #F8FAFC; 
        }

        .today-cell { 
            background-color: #FFFBEB; /* Amarelo sutil e confortável */
            border: 2px solid #F59E0B !important; 
        }

        .date-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }

        .date-num {
            font-weight: 600;
            font-size: 13px;
            color: #94A3B8;
        }

        /* Indicador circular moderno */
        .duty-day-circle {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent-bronze);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-bronze);
            font-size: 12px;
            font-weight: 700;
        }

        /* BADGES ARREDONDADOS E CORES PASTÉIS SÓBRIAS */
        .badges-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            color: #FFFFFF;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            letter-spacing: 0.5px;
        }

        /* Paleta atualizada para tons flat premium */
        .b-julio { background-color: #E11D48; }
        .b-carlos { background-color: #D97706; }
        .b-leticia { background-color: #0891B2; }
        .b-gustavo { background-color: #EA580C; }
        .b-tatiane { background-color: #2563EB; }
        .b-leandro { background-color: #7C3AED; }
        .b-felipe { background-color: #16A34A; }

        /* RODAPÉ LIMPO */
        footer {
            padding: 20px 24px;
            background-color: #F8FAFC;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .legend-container {
            display: flex;
            gap: 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }

        .l-dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
        }
        
        .l-active { border: 2px solid var(--accent-bronze); }
        .l-today { background-color: #FFFBEB; border: 2px solid #F59E0B; }

        .credit-footer {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .credit-footer strong {
            color: var(--primary-blue);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <header>
            <div class="title-block">
                <div class="month-title" id="month-label">Julho</div>
                <div class="year-title" id="year-label">2026</div>
            </div>

            <div class="nav-controls">
                <button class="btn-nav" id="btn-prev-month">« Ant</button>
                <button class="btn-nav" id="btn-next-month">Próx »</button>
            </div>
        </header>

        <div class="calendar-content">
            <table>
                <thead>
                    <tr>
                        <th>Dom</th>
                        <th>Seg</th>
                        <th>Ter</th>
                        <th>Qua</th>
                        <th>Qui</th>
                        <th>Sex</th>
                        <th>Sáb</th>
                    </tr>
                </thead>
                <tbody id="calendar-table-body">
                </tbody>
            </table>
        </div>

        <footer>
            <div class="legend-container">
                <div class="legend-item"><div class="l-dot l-active"></div> Dia de Trabalho</div>
                <div class="legend-item"><div class="l-dot l-today"></div> Hoje</div>
            </div>
            <div class="credit-footer">
                Desenvolvido por <strong>Felipe Souza</strong>
            </div>
        </footer>
    </div>

    <script>
        const monthNamesList = [
            "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", 
            "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
        ];
        
        let activeMonth = 6; 
        let activeYear = 2026;

        function calculateDaysFromAnchor(y, m, d) {
            const anchorDate = Date.UTC(2026, 6, 3);
            const targetDate = Date.UTC(y, m, d);
            return Math.floor((targetDate - anchorDate) / (1000 * 60 * 60 * 24));
        }

        function mathematicalMod(n, m) { 
            return ((n % m) + m) % m; 
        }

        function cleanStringForClass(text) {
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        function buildCalendarGrid(month, year) {
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalMonthDays = new Date(year, month + 1, 0).getDate();
            const realToday = new Date();

            document.getElementById("month-label").innerText = monthNamesList[month];
            document.getElementById("year-label").innerText = year;
            
            const tableBody = document.getElementById("calendar-table-body");
            tableBody.innerHTML = ""; 

            const staffRotationList = ["Júlio", "Carlos", "Leticia", "Gustavo", "Tatiane"];

            let currentDayNumber = 1;
            for (let weekRow = 0; weekRow < 6; weekRow++) {
                let rowElement = document.createElement("tr");
                let containsData = false;

                for (let dayColumn = 0; dayColumn < 7; dayColumn++) {
                    let cellElement = document.createElement("td");
                    
                    if ((weekRow === 0 && dayColumn < firstDayIndex) || currentDayNumber > totalMonthDays) {
                        cellElement.className = "empty-cell";
                    } else {
                        containsData = true;
                        
                        if (currentDayNumber === realToday.getDate() && year === realToday.getFullYear() && month === realToday.getMonth()) {
                            cellElement.className = "today-cell";
                        }

                        let activeWorkersThisDay = [];
                        let isDutyScheduled = false;

                        const dayDifference = calculateDaysFromAnchor(year, month, currentDayNumber);
                        const positionInCycle = mathematicalMod(dayDifference, 14);

                        if (positionInCycle === 0 || positionInCycle === 1 || positionInCycle === 2) {
                            isDutyScheduled = true;
                            let calculatedWeekendIndex;
                            if (positionInCycle === 0) calculatedWeekendIndex = Math.floor(dayDifference / 14);
                            else if (positionInCycle === 1) calculatedWeekendIndex = Math.floor((dayDifference - 1) / 14);
                            else calculatedWeekendIndex = Math.floor((dayDifference - 2) / 14);

                            const rotationOffset = mathematicalMod(calculatedWeekendIndex * 2, 5); 
                            const currentWeekendOrder = staffRotationList.slice(rotationOffset).concat(staffRotationList.slice(0, rotationOffset));

                            if (positionInCycle === 0) {
                                activeWorkersThisDay.push(currentWeekendOrder[0], currentWeekendOrder[1]);
                            } else if (positionInCycle === 1) {
                                activeWorkersThisDay.push("Felipe", currentWeekendOrder[2]);
                            } else if (positionInCycle === 2) {
                                activeWorkersThisDay.push(currentWeekendOrder[3], currentWeekendOrder[4]);
                            }
                        }
                        else if (positionInCycle === 6) {
                            isDutyScheduled = true;
                            activeWorkersThisDay.push("Leandro");
                        }

                        let cellInnerMarkup = `<div class="date-row">`;
                        if (isDutyScheduled) {
                            cellInnerMarkup += `<div class="duty-day-circle">${currentDayNumber}</div>`;
                        } else {
                            cellInnerMarkup += `<div class="date-num">${currentDayNumber}</div>`;
                        }
                        cellInnerMarkup += `</div><div class="badges-list">`;
                        
                        activeWorkersThisDay.forEach(workerName => {
                            cellInnerMarkup += `<span class="badge b-${cleanStringForClass(workerName)}">${workerName}</span>`;
                        });
                        cellInnerMarkup += `</div>`;
                        
                        cellElement.innerHTML = cellInnerMarkup;
                        currentDayNumber++;
                    }
                    rowElement.appendChild(cellElement);
                }
                if (containsData) tableBody.appendChild(rowElement);
                if (currentDayNumber > totalMonthDays) break;
            }
        }

        document.getElementById("btn-prev-month").onclick = () => {
            activeMonth--;
            if (activeMonth < 0) { 
                activeMonth = 11; 
                activeYear--; 
            }
            buildCalendarGrid(activeMonth, activeYear);
        };

        document.getElementById("btn-next-month").onclick = () => {
            activeMonth++;
            if (activeMonth > 11) { 
                activeMonth = 0; 
                activeYear++; 
            }
            buildCalendarGrid(activeMonth, activeYear);
        };

        buildCalendarGrid(activeMonth, activeYear);
    </script>
</body>
</html>
